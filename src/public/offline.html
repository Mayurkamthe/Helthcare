<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Medico</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-900 flex items-center justify-center p-6">
  <div class="text-center max-w-sm">
    <!-- Icon -->
    <div class="w-20 h-20 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-slate-700">
      <svg class="w-10 h-10 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/>
      </svg>
    </div>

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-6">
      <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h15m-7.5-7.5v15"/>
        </svg>
      </div>
      <span class="text-white font-bold text-xl">Medico</span>
    </div>

    <h1 class="text-2xl font-bold text-white mb-2">You're offline</h1>
    <p class="text-slate-400 text-sm mb-8 leading-relaxed">
      No internet connection detected. Some cached pages may still be available.
      IoT device data will sync automatically when you reconnect.
    </p>

    <!-- Status -->
    <div id="status" class="flex items-center justify-center gap-2 text-sm text-slate-500 mb-6">
      <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
      Offline
    </div>

    <!-- Retry -->
    <button onclick="retryConnection()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors mb-3">
      Try Again
    </button>

    <!-- Cached pages -->
    <a href="/dashboard"
      class="block w-full border border-slate-700 text-slate-300 hover:bg-slate-800 font-medium py-3 px-6 rounded-xl transition-colors text-sm">
      Open Cached Dashboard
    </a>
  </div>

  <script>
    function retryConnection() {
      window.location.reload();
    }

    // Auto-detect reconnection
    window.addEventListener('online', () => {
      document.getElementById('status').innerHTML =
        '<span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> Back online — redirecting...';
      setTimeout(() => window.location.href = '/dashboard', 1000);
    });
  </script>
</body>
</html>
